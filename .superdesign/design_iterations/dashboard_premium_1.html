<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NOJOB Dashboard — Premium Direction</title>
  <style>
    :root {
      --ink: #0f172a;
      --muted: #64748b;
      --violet: #6366f1;
      --sky: #0ea5e9;
      --amber: #f59e0b;
      --glass: rgba(255,255,255,0.55);
      --hair: rgba(255,255,255,0.72);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(120% 80% at 50% -10%, rgba(99,102,241,0.14), transparent 55%),
        radial-gradient(70% 50% at 100% 40%, rgba(14,165,233,0.08), transparent 50%),
        radial-gradient(60% 45% at 0% 90%, rgba(245,158,11,0.06), transparent 50%),
        linear-gradient(180deg, #eef0f7 0%, #e4e9f4 100%);
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.5rem; }
    .hero {
      display: grid;
      gap: 1.5rem;
      padding: 1.75rem 1.75rem;
      border-radius: 1.75rem;
      border: 1px solid rgba(255,255,255,0.65);
      background: var(--glass);
      backdrop-filter: blur(20px);
      box-shadow:
        0 1px 0 var(--hair) inset,
        0 24px 48px -24px rgba(30, 27, 75, 0.18);
    }
    @media (min-width: 768px) {
      .hero { grid-template-columns: 1fr auto; align-items: center; padding: 2rem 2.25rem; }
    }
    .eyebrow {
      font-size: 10px; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 0.75rem;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.75rem, 4vw, 2.35rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      background: linear-gradient(105deg, #0f172a, #3730a3, #5b21b6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .cta {
      align-self: stretch;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.85rem 1.25rem;
      border-radius: 1rem;
      border: none;
      font-weight: 700;
      font-size: 0.875rem;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(120deg, #0f172a, #4338ca, #6d28d9);
      box-shadow: 0 12px 32px -8px rgba(67, 56, 202, 0.45);
    }
    .cta:hover { transform: translateY(-1px); box-shadow: 0 16px 40px -8px rgba(67, 56, 202, 0.5), 0 0 0 1px rgba(245, 158, 11, 0.25); }
    .rank {
      margin-top: 2rem;
      border-radius: 1.5rem;
      padding: 1px;
      background: linear-gradient(145deg, rgba(99,102,241,0.35), rgba(14,165,233,0.2), rgba(245,158,11,0.25));
    }
    .rank-inner {
      border-radius: calc(1.5rem - 1px);
      padding: 1.5rem;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(12px);
    }
    .metrics {
      margin-top: 2rem;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
    }
    @media (min-width: 768px) { .metrics { grid-template-columns: repeat(4, 1fr); gap: 1rem; } }
    .stat {
      border-radius: 1.25rem;
      padding: 1.1rem;
      border: 1px solid rgba(226,232,240,0.95);
      background: rgba(255,255,255,0.78);
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }
    .stat:hover {
      border-color: rgba(165,180,252,0.65);
      box-shadow: 0 12px 36px -16px rgba(99,102,241,0.2);
      transform: translateY(-3px);
    }
    p.note { font-size: 11px; color: var(--muted); margin-top: 2rem; text-align: center; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div>
        <div class="eyebrow">Momentum</div>
        <h1>Alex's command center</h1>
        <p style="margin:0.75rem 0 0; color:var(--muted); font-size:0.9rem; max-width:28rem;">
          12 applications tracked — one interview coming up.
        </p>
      </div>
      <button type="button" class="cta">+ Add job</button>
    </div>
    <div class="rank">
      <div class="rank-inner">
        <strong>Personal rank</strong> — ring + streak module (warm accent only here).
      </div>
    </div>
    <div class="metrics">
      <div class="stat"><strong>12</strong><br /><span style="font-size:10px; color:var(--muted); text-transform:uppercase;">Apps</span></div>
      <div class="stat"><strong>38%</strong><br /><span style="font-size:10px; color:var(--muted);">Response</span></div>
      <div class="stat"><strong>2</strong><br /><span style="font-size:10px; color:var(--muted);">Interviews</span></div>
      <div class="stat"><strong>3</strong><br /><span style="font-size:10px; color:var(--muted);">Days since</span></div>
    </div>
    <p class="note">SuperDesign reference — implement in React + Tailwind (Dashboard, RankCard, Sidebar).</p>
  </div>
</body>
</html>
