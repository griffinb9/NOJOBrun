<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NOJOB Job Tracker — Premium Direction</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: linear-gradient(180deg,#eceef8,#e4e9f4); min-height: 100vh; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; background: rgba(255,255,255,0.72); border-bottom: 1px solid rgba(99,102,241,0.12); backdrop-filter: blur(12px); }
    .lane { width: 260px; border-radius: 1.25rem; background: linear-gradient(180deg, rgba(255,255,255,0.55), rgba(248,250,252,0.85)); border: 1px solid rgba(226,232,240,0.9); box-shadow: 0 1px 0 rgba(255,255,255,0.8) inset; }
    .card { border-radius: 1rem; background: rgba(255,255,255,0.92); border: 1px solid rgba(226,232,240,0.85); border-left: 3px solid #6366f1; box-shadow: 0 4px 20px -8px rgba(30,27,75,0.1); padding: 0.85rem; }
  </style>
</head>
<body>
  <div class="toolbar"><strong>Tracker</strong><button style="background:linear-gradient(120deg,#4338ca,#6d28d9);color:#fff;border:0;padding:.5rem 1rem;border-radius:.75rem;">Add job</button></div>
  <div style="display:flex;gap:1.25rem;padding:1.5rem;">
    <div class="lane"><div style="padding:.75rem;font-size:12px;font-weight:700;">Applied <span style="float:right;background:#e0e7ff;padding:2px 8px;border-radius:999px;">3</span></div><div style="padding:.5rem;"><div class="card">Acme — Engineer</div></div></div>
    <div class="lane"><div style="padding:.75rem;font-size:12px;font-weight:700;color:#64748b;">Screen</div><div style="padding:2rem;text-align:center;color:#94a3b8;font-size:11px;border:1px dashed #cbd5e1;border-radius:.75rem;margin:.5rem;">Your next screen lands here.</div></div>
  </div>
  <p style="text-align:center;font-size:11px;color:#64748b;margin-top:2rem;">SuperDesign reference — frosted toolbar, glass lanes, soft cards.</p>
</body>
</html>
