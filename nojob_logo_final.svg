  <text x="340" y="303"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="12.5" fill="#4B5563" letter-spacing="4">From NoJob to YesJob</text>

  <rect x="300" y="320" width="80" height="1.5" rx="1" fill="url(#r_brand)" opacity="0.6"/>
