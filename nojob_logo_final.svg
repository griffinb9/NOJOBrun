<svg xmlns="http://www.w3.org/2000/svg" width="680" height="380" viewBox="0 0 680 380">
  <defs>
    <linearGradient id="r_ibg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#1E2042"/>
      <stop offset="100%" stop-color="#0C0E1E"/>
    </linearGradient>
    <linearGradient id="r_brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4776F0"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="r_top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="white" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="r_word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="40%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="r_card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111326"/>
      <stop offset="100%" stop-color="#080910"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="680" height="380" rx="0" fill="url(#r_card)"/>
  <rect x="240" y="28" width="200" height="200" rx="46" fill="url(#r_ibg)"/>
  <rect x="241.5" y="29.5" width="197" height="197" rx="45" fill="none" stroke="white" stroke-width="1" opacity="0.12"/>
  <ellipse cx="340" cy="200" rx="80" ry="28" fill="#5B6EF8" opacity="0.13"/>

  <path d="M 289,130 L 289,94 L 340,50 L 391,94 L 391,130"
